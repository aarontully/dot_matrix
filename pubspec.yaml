name: dot_matrix
description: "Dot Matrix - A secure, cross-platform Matrix chat client with end-to-end encryption, rich messaging, and a modern Material 3 interface."
publish_to: 'none'
version: 1.0.0+1-alpha

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  matrix: ^0.24.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  path_provider: ^2.1.2
  get: ^4.7.2
  flutter_olm: ^2.0.0
  flutter_openssl_crypto: ^0.5.0
  photo_view: ^0.15.0
  file_picker: ^8.0.0
  flutter_sound: ^9.2.13
  just_audio: ^0.9.46
  permission_handler: ^11.3.1
  flutter_linkify: ^6.0.0
  url_launcher: ^6.2.6
  video_player: ^2.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

flutter_native_splash:
  color: "#0084FF"
  color_dark: "#111318"
  image: "assets/logo.png"
  android: true
  ios: true
  web: true
