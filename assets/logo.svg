  <!-- Row 4 -->
  <circle cx="36" cy="60" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="48" cy="60" r="3" fill="#ffffff"/>
  <circle cx="60" cy="60" r="3" fill="#ffffff"/>
  <circle cx="72" cy="60" r="3" fill="#ffffff"/>
