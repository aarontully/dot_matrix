  <!-- Row 7 -->
  <circle cx="36" cy="96" r="3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="48" cy="96" r="3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="60" cy="96" r="3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="72" cy="96" r="3" fill="rgba(255,255,255,0.15)"/>
