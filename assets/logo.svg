<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#0084FF"/>
  
  <!-- Dot matrix grid forming a chat bubble / diamond pattern -->
